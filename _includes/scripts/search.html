<!-- ninja-keys search component -->
<script type="module" src="https://unpkg.com/ninja-keys@{{ site.ninja_keys.version }}?module"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Initialize ninja-keys with search data
  const ninja = document.querySelector('ninja-keys');
  if (ninja) {
    ninja.data = window.searchData || [];
    // enable Cmd/Ctrl+K shortcut to open search
    window.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        ninja.open();
      }
    });
    
    // Open search when clicking the search icon
    const searchToggle = document.getElementById('search-toggle');
    if (searchToggle) {
      searchToggle.addEventListener('click', function(e) {
        e.preventDefault();
        ninja.open();
      });
    }
  }
});
</script>
